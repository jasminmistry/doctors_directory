name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CONTAINER_NAME: doctors-directory
  APP_PORT: "3000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME || env.CONTAINER_NAME }}
          APP_PORT: ${{ vars.APP_PORT || env.APP_PORT }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || vars.NEXT_PUBLIC_BASE_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_NAME,CONTAINER_NAME,APP_PORT,NEXT_PUBLIC_BASE_URL,GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            docker login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
            docker pull "$IMAGE_NAME:latest"

            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "127.0.0.1:$APP_PORT:3000" \
              -e NEXT_PUBLIC_BASE_URL="$NEXT_PUBLIC_BASE_URL" \
              "$IMAGE_NAME:latest"
