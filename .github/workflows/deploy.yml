name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CONTAINER_NAME: doctors-directory
  REDIS_CONTAINER: doctors-directory-redis
  APP_NETWORK: doctors-directory-net
  APP_PORT: "3000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=min
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME || env.CONTAINER_NAME }}
          REDIS_CONTAINER: ${{ env.REDIS_CONTAINER }}
          APP_NETWORK: ${{ env.APP_NETWORK }}
          APP_PORT: ${{ vars.APP_PORT || env.APP_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_NAME,CONTAINER_NAME,REDIS_CONTAINER,APP_NETWORK,APP_PORT,GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            CONTAINER_NEW="${CONTAINER_NAME}-new"
            CONTAINER_OLD="${CONTAINER_NAME}-old"
            REDIS_URL="redis://redis:6379"

            docker login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
            docker pull "$IMAGE_NAME:latest"

            # ----------------------------------------------------------------
            # Ensure shared Docker network exists
            # ----------------------------------------------------------------
            docker network create "$APP_NETWORK" 2>/dev/null || true

            # ----------------------------------------------------------------
            # Ensure Redis is running (idempotent — survives app deploys).
            # Data persists in a named volume across container recreates.
            # Reachable by the app containers via the network alias "redis".
            # ----------------------------------------------------------------
            REDIS_RUNNING=$(docker inspect -f '{{.State.Running}}' "$REDIS_CONTAINER" 2>/dev/null || echo "false")
            if [ "$REDIS_RUNNING" != "true" ]; then
              echo "Starting Redis container..."
              docker rm -f "$REDIS_CONTAINER" 2>/dev/null || true
              docker run -d \
                --name "$REDIS_CONTAINER" \
                --restart unless-stopped \
                --network "$APP_NETWORK" \
                --network-alias redis \
                -v doctors-directory-redis-data:/data \
                --memory="256m" \
                redis:8-alpine \
                redis-server --appendonly yes
              echo "Redis started"
            else
              echo "Redis already running — ensuring it is on $APP_NETWORK..."
              docker network connect "$APP_NETWORK" "$REDIS_CONTAINER" 2>/dev/null || true
            fi

            # ----------------------------------------------------------------
            # Blue-green deployment
            # ----------------------------------------------------------------
            echo "Starting blue-green deployment..."
            docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
            docker rm -f "$CONTAINER_OLD" 2>/dev/null || true

            # Use a temp port for health checking while live port stays up.
            TEMP_PORT=$((APP_PORT + 1))

            docker run -d \
              --name "$CONTAINER_NEW" \
              --restart no \
              --network "$APP_NETWORK" \
              -p "127.0.0.1:$TEMP_PORT:3000" \
              --memory="2248m" \
              --cpus="2.0" \
              -e "REDIS_URL=$REDIS_URL" \
              "$IMAGE_NAME:latest"

            echo "Waiting for container to be healthy (temp port $TEMP_PORT)..."
            for i in {1..90}; do
              HEALTH_STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NEW" 2>/dev/null || echo "starting")
              if [ "$HEALTH_STATUS" = "healthy" ]; then
                echo "Container is healthy"
                break
              fi
              if [ "$HEALTH_STATUS" = "unhealthy" ]; then
                echo "ERROR: Container became unhealthy"
                docker logs --tail 100 "$CONTAINER_NEW" || true
                docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
                exit 1
              fi
              echo "Health check attempt $i/90 (status: $HEALTH_STATUS)..."
              sleep 2
            done

            FINAL_HEALTH_STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NEW" 2>/dev/null || echo "unknown")
            if [ "$FINAL_HEALTH_STATUS" != "healthy" ]; then
              echo "ERROR: Container did not become healthy in time"
              docker logs --tail 100 "$CONTAINER_NEW" || true
              docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
              exit 1
            fi

            # New container is healthy — remove temp instance.
            docker rm -f "$CONTAINER_NEW"

            # Stop old container (frees the live port), start new on live port.
            echo "Switching traffic to new container..."
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --network "$APP_NETWORK" \
              -p "127.0.0.1:$APP_PORT:3000" \
              --memory="2248m" \
              --cpus="2.0" \
              -e "REDIS_URL=$REDIS_URL" \
              "$IMAGE_NAME:latest"

            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null || echo false)" != "true" ]; then
              echo "ERROR: Final container failed to start"
              docker logs --tail 100 "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "Blue-green deployment completed successfully"

      - name: Cleanup Docker resources
        uses: appleboy/ssh-action@v1.2.0
        if: always()
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Cleaning up Docker resources..."
            docker image prune -af --filter "until=72h"
            docker container prune -f
            echo "Docker cleanup completed"
