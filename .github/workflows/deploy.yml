name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CONTAINER_NAME: doctors-directory
  APP_PORT: "3000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=min
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME || env.CONTAINER_NAME }}
          APP_PORT: ${{ vars.APP_PORT || env.APP_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_NAME,CONTAINER_NAME,APP_PORT,GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            CONTAINER_NEW="${CONTAINER_NAME}-new"
            CONTAINER_OLD="${CONTAINER_NAME}-old"

            docker login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
            docker pull "$IMAGE_NAME:latest"

            echo "Starting blue-green deployment..."
            # Clean up any leftover containers from a previous failed deploy
            docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
            docker rm -f "$CONTAINER_OLD" 2>/dev/null || true

            # Run new container (blue)
            docker run -d \
              --name "$CONTAINER_NEW" \
              --restart unless-stopped \
              -p "127.0.0.1:$APP_PORT:3000" \
              --memory="512m" \
              --cpus="1.0" \
              "$IMAGE_NAME:latest"

            # Wait for new container health
            echo "Waiting for container to be healthy..."
            for i in {1..90}; do
              HEALTH_STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NEW" 2>/dev/null || echo "starting")
              if [ "$HEALTH_STATUS" = "healthy" ]; then
                echo "Container is healthy"
                break
              fi
              if [ "$HEALTH_STATUS" = "unhealthy" ]; then
                echo "ERROR: Container became unhealthy"
                docker logs --tail 100 "$CONTAINER_NEW" || true
                docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
                exit 1
              fi
              echo "Health check attempt $i/90 (status: $HEALTH_STATUS)..."
              sleep 2
            done

            FINAL_HEALTH_STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NEW" 2>/dev/null || echo "unknown")
            if [ "$FINAL_HEALTH_STATUS" != "healthy" ]; then
              echo "ERROR: Container did not become healthy in time"
              docker logs --tail 100 "$CONTAINER_NEW" || true
              docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
              exit 1
            fi

            # Verify new container is still running
            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NEW" 2>/dev/null || echo false)" != "true" ]; then
              echo "ERROR: New container is not running"
              docker logs --tail 100 "$CONTAINER_NEW" || true
              docker rm -f "$CONTAINER_NEW" 2>/dev/null || true
              exit 1
            fi

            # Switch: move current primary to backup (if present), then promote new.
            PRIMARY_ID=$(docker ps -aq -f "name=^/${CONTAINER_NAME}$" || true)
            if [ -n "$PRIMARY_ID" ]; then
              docker rm -f "$CONTAINER_OLD" 2>/dev/null || true
              docker rename "$CONTAINER_NAME" "$CONTAINER_OLD" 2>/dev/null || true
            fi

            docker rename "$CONTAINER_NEW" "$CONTAINER_NAME"

            # Confirm promoted container is running under primary name.
            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null || echo false)" != "true" ]; then
              echo "ERROR: Promoted container is not running"
              docker logs --tail 100 "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "Blue-green deployment completed successfully"

      - name: Cleanup Docker resources
        uses: appleboy/ssh-action@v1.2.0
        if: always()
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Cleaning up Docker resources..."
            docker image prune -af --filter "until=72h"
            docker container prune -f
            docker volume prune -f
            echo "Docker cleanup completed"
